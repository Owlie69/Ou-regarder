name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Precompute visibility analysis
        run: node scripts/precompute-visibility.mjs
        continue-on-error: true   # don't fail the build if Paris OD / Overpass is down

      - name: Swap server actions for static stubs
        run: cp app/admin/actions-static.ts app/admin/actions.ts

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: https://owlie69.github.io/Ou-regarder
          STATIC_EXPORT: 'true'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
